# grblHAL post-processor.
#
# grblHAL is a strict superset of Grbl 1.1 — anything Grbl accepts,
# grblHAL accepts. The differences shipped here:
#
# - Adds explicit `G54` to the preamble (grblHAL's `$13=0` default
#   applies the WCS but emitting it makes intent obvious to operators
#   and matches the LinuxCNC / Mach3 convention).
# - Sets `units = "mm"` and `wcs = "G54"` as data on the post so the
#   wizard can surface them without re-parsing the preamble.
# - Same decimal places as the Grbl post (3 dp xyz/ijk, 0 dp feed).
#
# Differences NOT yet expressed here (deferred until the corresponding
# PostDefinition fields land — Phase 5+):
#
# - grblHAL implements M6 ATC macros (`$TC` config). Vanilla Grbl
#   does not. When the `tool_change.use_m6` field lands, this post
#   will set it `true` (currently the M6 emission is unconditional in
#   program_builder, which is fine for grblHAL but rejected by
#   gvalidate when the Grbl post is selected — see gap report).
# - M62/M63 digital output control, real-time overrides via $G — none
#   of our shipped fixtures exercise these. Future fixtures that do
#   will go in `posts/fixtures_grblhal/`.

name = "grblHAL"
wcs = "G54"
units = "mm"

# Preamble: header comment, modal defaults, WCS, spindle on. The
# `{wcs_line}` token expands to "G54\n" because of the `wcs = "G54"`
# field above.
preamble = """\
(Generated by rs_cam)
G17 G21 G90 G40 G49 G80
{wcs_line}M3 S{spindle_rpm}
"""

# Postamble: spindle off, retract to literal safe Z, program end.
# Mirrors the Grbl post; grblHAL accepts both M30 and M2 — M30 is the
# canonical "program end + reset" that operators expect.
postamble = """\
M5
G0 Z10.000
M30
"""

# Program pause used by multi-setup boundaries.
program_pause = """\
M5
{message_comment}
M0
"""

# grblHAL implements M7 (mist) and the full M-code surface, so no
# unsupported_mcodes entries here. Cutter compensation is OFF by
# default for hobby grblHAL builds (most boards don't enable it);
# flip this in a per-machine override if your build does.
supports_cutter_comp = false

[arc_linearize]
enabled = true
threshold_mm = 0.05

[decimals]
xyz = 3
feed = 0
ijk = 3

[comment]
format = "({text})"
