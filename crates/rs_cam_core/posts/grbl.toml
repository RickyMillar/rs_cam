# GRBL 1.1+ post-processor.
#
# Mirrors the legacy `GrblPost` Rust impl byte-for-byte. Verified by
# `gcode_emitter_parity` (side-by-side vs old trait) and by the
# captured-fixtures check that `planning/gcode_current_outputs/` is
# unchanged after the data-driven emitter takes over.

name = "GRBL"

# Preamble: header comment, modal defaults, spindle on at requested RPM.
# Trailing `\` on the opening `"""` line eats the leading newline so the
# rendered string starts with `(Generated by rs_cam)`.
preamble = """\
(Generated by rs_cam)
G17 G21 G90 G40 G49 G80
M3 S{spindle_rpm}
"""

# Postamble: spindle off, retract to safe Z (literal value, not a
# parameter — matches legacy behaviour), program end.
postamble = """\
M5
G0 Z10.000
M30
"""

# Program pause used by multi-setup boundaries: spindle off, message,
# pause-for-operator. `{message_comment}` is filled by the emitter using
# this post's comment style.
program_pause = """\
M5
{message_comment}
M0
"""

# Grbl 1.1 lacks mist coolant (M7) and cutter compensation
# (G40/G41/G42). Without these guards, user pre/post snippets that
# emit M7 or comp toggles fail at the controller.
unsupported_mcodes = [7]
supports_cutter_comp = false

# Linearise sub-0.05mm arcs into chords — Grbl 1.1 rejects them
# outright with "arc trajectory inconsistent" otherwise.
[arc_linearize]
enabled = true
threshold_mm = 0.05

[decimals]
xyz = 3
feed = 0
ijk = 3

[comment]
format = "({text})"
