# LinuxCNC post-processor.
#
# Mirrors the legacy `LinuxCncPost` Rust impl byte-for-byte.

name = "LinuxCNC"
# Default WCS surfaces as `{wcs_line}` in the preamble template.
wcs = "G54"
units = "mm"

# Adds an explicit WCS line after the modal defaults compared to GRBL —
# LinuxCNC requires WCS to be set before the first cutting move.
preamble = """\
(Generated by rs_cam)
G17 G21 G90 G40 G49 G80
{wcs_line}M3 S{spindle_rpm}
"""

# Postamble: spindle off, machine-coords retract, M2 program end
# (LinuxCNC convention; M30 is reserved for tape rewind).
postamble = """\
M5
G53 G0 Z0
M2
"""

program_pause = """\
M5
{message_comment}
M0
"""

# LinuxCNC supports the full M-code/G-code surface including mist,
# flood, and cutter compensation (G41/G42).
# supports_cutter_comp defaults to true.

# Linearise sub-0.05mm arcs to dodge offline parser rejections.
[arc_linearize]
enabled = true
threshold_mm = 0.05

[decimals]
xyz = 4
feed = 1
ijk = 4

[comment]
format = "({text})"
