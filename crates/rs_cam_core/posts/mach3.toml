# Mach3 (mill) post-processor.
#
# Mirrors the legacy `Mach3Post` Rust impl byte-for-byte.

name = "Mach3"

# Mach3 quirks: omits `G49` from modal defaults (the legacy impl does);
# inserts `G4 P2` after spindle-on so the spindle has time to spin up
# before the first cutting move.
preamble = """\
(Generated by rs_cam)
G17 {units_word} G90 G40 G80
M3 S{spindle_rpm}
G4 P2
"""

# Postamble: spindle off, retract to literal safe Z, then `G28 G91 Z0`
# to send the Z axis home before program end (Mach3 convention).
postamble = """\
M5
G0 Z10.000
G28 G91 Z0
M30
"""

program_pause = """\
M5
{message_comment}
M0
"""

# Mach3 supports mist coolant (M7) and cutter compensation
# (G41/G42). supports_cutter_comp defaults to true.

[arc_linearize]
enabled = true
threshold_mm = 0.05

[decimals]
xyz = 4
feed = 1
ijk = 4

[comment]
format = "({text})"
